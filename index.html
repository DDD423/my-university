<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家里蹲大学 - 教务管理系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h1 { color: #333; font-size: 24px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🎓 家里蹲大学</h1>
        <p>统一身份认证系统</p>
        <input type="text" placeholder="请输入学号" id="studentId">
        <input type="password" placeholder="请输入密码" id="password">
        <button onclick="login()">登 录</button>
    </div>

    <script>
        function login() {
            // 这里是一段非常简单的伪装逻辑
            alert("系统维护中：当前为选课高峰期，请稍后再试！");
        }
    </script>

</body>
</html>
